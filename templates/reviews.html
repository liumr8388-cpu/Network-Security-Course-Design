{% extends "base.html" %}
{% set title = "书评咨询" %}
{% block content %}
<section class="section narrow">
  <h1>书评咨询</h1>
  <p class="muted">读者可以提交书评、荐购建议或借阅咨询。</p>
  <form class="stacked-form" method="post">
    <label>姓名
      <input name="name" maxlength="40" placeholder="匿名读者">
    </label>
    <label>相关图书
      <select name="book">
        {% for book in books %}
        <option value="{{ book.title }}">{{ book.title }}</option>
        {% endfor %}
      </select>
    </label>
    <label>内容
      <textarea name="content" maxlength="300" rows="5" placeholder="请输入书评或咨询内容"></textarea>
    </label>
    <button type="submit">提交</button>
  </form>

  <div class="result-list">
    {% for review in reviews %}
    <article class="result-item">
      <strong>{{ review.name }} · {{ review.book }}</strong>
      <span>{{ review.content }}</span>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
